name: Test and Build Go Application

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version: '1.25'

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod tidy
        working-directory: ./${{ inputs.service-name }}

      - name: Run tests
        run: go test ./...
        working-directory: ./${{ inputs.service-name }}

      - name: Build application
        run: go build ./...
        working-directory: ./${{ inputs.service-name }}
